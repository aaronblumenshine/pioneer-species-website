<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pioneer Notes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }

    .form-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 2rem;
    }

    .form-card input,
    .form-card textarea {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.625rem 0.75rem;
      font-size: 0.9375rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    .form-card input:focus,
    .form-card textarea:focus {
      border-color: #6366f1;
      background: #fff;
    }

    .form-card input { margin-bottom: 0.625rem; }
    .form-card textarea { min-height: 90px; margin-bottom: 0.75rem; }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.625rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4f52d8; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .status {
      font-size: 0.875rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
      color: #6b7280;
    }

    .status.error { color: #dc2626; }
    .status.success { color: #16a34a; }

    .notes-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .note-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .note-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.375rem;
    }

    .note-body {
      font-size: 0.9375rem;
      color: #374151;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .note-date {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 0.625rem;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 2rem 0;
      font-size: 0.9375rem;
    }

    .loading {
      text-align: center;
      color: #9ca3af;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pioneer Notes</h1>

    <div class="form-card">
      <input id="title" type="text" placeholder="Title" maxlength="200" />
      <textarea id="body" placeholder="What's on your mind?"></textarea>
      <button id="submit-btn" onclick="submitNote()">Post Note</button>
      <div id="status" class="status"></div>
    </div>

    <div id="notes-list" class="notes-list">
      <div class="loading">Loading notes&hellip;</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://sekpqplpwiiithfqyjmo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNla3BxcGxwd2lpaXRoZnF5am1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjY2ODgsImV4cCI6MjA5MjMwMjY4OH0.BtPXCYZN1aFV-LhxMfVhP7Ad4w3BzxojIvIfvAwRQxk';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function escape(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function loadNotes() {
      const list = document.getElementById('notes-list');
      const { data, error } = await db
        .from('notes')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = `<div class="empty">Failed to load notes: ${escape(error.message)}</div>`;
        return;
      }

      if (!data.length) {
        list.innerHTML = '<div class="empty">No notes yet &mdash; post the first one.</div>';
        return;
      }

      list.innerHTML = data.map(n => `
        <div class="note-card">
          <div class="note-title">${escape(n.title)}</div>
          <div class="note-body">${escape(n.body)}</div>
          <div class="note-date">${new Date(n.created_at).toLocaleString()}</div>
        </div>
      `).join('');
    }

    async function submitNote() {
      const titleEl = document.getElementById('title');
      const bodyEl = document.getElementById('body');
      const btn = document.getElementById('submit-btn');

      const title = titleEl.value.trim();
      const body = bodyEl.value.trim();

      if (!title) { setStatus('Title is required.', 'error'); return; }
      if (!body)  { setStatus('Body is required.', 'error'); return; }

      btn.disabled = true;
      setStatus('Posting…', '');

      const { error } = await db.from('notes').insert({ title, body });

      if (error) {
        setStatus('Error: ' + escape(error.message), 'error');
        btn.disabled = false;
        return;
      }

      titleEl.value = '';
      bodyEl.value = '';
      setStatus('Note posted!', 'success');
      btn.disabled = false;
      await loadNotes();
      setTimeout(() => setStatus('', ''), 3000);
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (type ? ' ' + type : '');
    }

    loadNotes();
  </script>
</body>
</html>
